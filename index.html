<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spirelite</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <div class="title">Spirelite</div>
        <div class="subtitle">A tiny Slay-the-Spire-ish roguelite</div>
      </div>
    </div>

    <div class="hud">
      <span class="pill" id="hudFloor">Floor: 1</span>
      <span class="pill" id="hudGold">Gold: 0</span>
      <span class="pill" id="hudRelics">Relics: 0</span>

      <button class="btn" id="btnNewRun">New Run</button>
      <button class="btn ghost" id="btnViewDeck">View Deck</button>
      <button class="btn ghost" id="btnSave">Save</button>
      <button class="btn ghost" id="btnLoad">Load</button>
    </div>
  </header>

  <main class="layout">
    <!-- LEFT PANEL -->
    <section class="panel">
      <h2>Player</h2>

      <div class="stats">
        <div class="stat">
          <div class="label">HP</div>
          <div class="value" id="pHp">70 / 70</div>
          <div class="bar"><div class="fill" id="pHpBar" style="width:100%"></div></div>
        </div>

        <div class="stat">
          <div class="label">Block</div>
          <div class="value" id="pBlock">0</div>
        </div>

        <div class="stat">
          <div class="label">Energy</div>
          <div class="value" id="pEnergy">3</div>
        </div>

        <div class="stat">
          <div class="label">Status</div>
          <div class="value small" id="pStatus">None</div>
        </div>

        <div class="stat">
          <div class="label">Piles</div>
          <div class="deckRow">
            <span class="badge">Draw: <strong id="drawCount">0</strong></span>
            <span class="badge">Discard: <strong id="discardCount">0</strong></span>
            <span class="badge">Exhaust: <strong id="exhaustCount">0</strong></span>
          </div>
        </div>
      </div>

      <div class="note" id="leftNote"></div>
    </section>

    <!-- CENTER SCREEN -->
    <section class="panel">
      <h2>Run</h2>
      <div class="screen" id="screen"></div>
    </section>

    <!-- RIGHT PANEL -->
    <section class="panel">
      <h2>Log</h2>
      <div class="log" id="log"></div>
    </section>
  </main>

  <!-- MODAL -->
  <div class="modalWrap hidden" id="modalWrap">
    <div class="modal">
      <div class="modalHead">
        <div class="modalTitle" id="modalTitle">Modal</div>
        <button class="btn ghost" id="btnModalClose">Close</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

  <!-- ENTRY -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
